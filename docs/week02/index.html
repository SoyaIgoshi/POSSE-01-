<!DOCTYPE html>

<body class="bg-gray-100 flex items-center justify-center min-h-screen  xl:w-[100vw]">
    <div class="bg-green-800 w-[100vw]">    

        <div class="p-4">

            <p class="text-white text-sm mb-4 mx-auto">スターバックスは、世界中で愛されているコーヒーチェーン店です。高品質なコーヒーと快適な空間が特徴です。</p>
            <img src="./スクリーンショット 2026-05-21 173802.png" alt="スタバの写真" class="mx-auto">
        </div>
        <div class="flex justify-around mx-auto">
            <div class="bg-white rounded-xl overflow-hidden w-80 shadow-lg">

                    <h1 class="text-green-800 text-2xl font-bold mb-1">メニュー</h1>
                    <ul class="text-gray-800 text-base mb-4 space-y-1 list-none">
                        <li>コーヒー<span class="text-gray-800 font-bold"> 500円</span></li>
                        <li>カフェラテ<span class="text-gray-800 font-bold"> 550円</span></li>
                        <li>カプチーノ<span class="text-gray-800 font-bold"> 550円</span></li>

                    </ul>    
                </div>
            </div>     

            <div class="bg-white rounded-xl overflow-hidden w-80 shadow-lg">
                <div class="p-4 text-center">
                    <h1 class="text-green-800 text-2xl font-bold mb-1">フード</h1>
                    <ul class="text-gray-800 text-base mb-4 space-y-1 list-none">
                        <li>サンドイッチ<span class="text-gray-800 font-bold"> 400円</span></li>
                        <li>サラダ<span class="text-gray-800 font-bold"> 300円</span></li>
                        <li>スコーン<span class="text-gray-800 font-bold"> 200円</span></li>
                        <li>マフィン<span class="text-gray-800 font-bold"> 250円</span></li>
                        <li>クッキー<span class="text-gray-800 font-bold"> 150円</span></li>
